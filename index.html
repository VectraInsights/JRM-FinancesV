<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRM Financial Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white">📊 JRM Financial</h1>
                <p class="text-slate-400 text-sm">Dashboard de Gestão BPO</p>
            </div>
            
            <div class="flex gap-3">
                <select id="ano-select" class="bg-slate-800 border border-slate-700 rounded px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                </select>
                <button onclick="carregarDados()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition">
                    Atualizar
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass p-6 rounded-xl shadow-lg">
                <p class="text-slate-400 text-sm uppercase font-semibold">Faturamento</p>
                <h2 id="kpi-faturamento" class="text-3xl font-bold text-emerald-400">R$ 0,00</h2>
            </div>
            <div class="glass p-6 rounded-xl shadow-lg">
                <p class="text-slate-400 text-sm uppercase font-semibold">Despesas</p>
                <h2 id="kpi-despesas" class="text-3xl font-bold text-rose-400">R$ 0,00</h2>
            </div>
            <div class="glass p-6 rounded-xl shadow-lg">
                <p class="text-slate-400 text-sm uppercase font-semibold">Resultado Líquido</p>
                <h2 id="kpi-resultado" class="text-3xl font-bold text-blue-400">R$ 0,00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass p-4 rounded-xl">
                <h3 class="text-lg font-semibold mb-4 ml-2">Distribuição por Setor</h3>
                <div id="chart-setores" class="w-full h-[400px]"></div>
            </div>
            <div class="glass p-4 rounded-xl">
                <h3 class="text-lg font-semibold mb-4 ml-2">Top 10 Categorias de Despesa</h3>
                <div id="chart-categorias" class="w-full h-[400px]"></div>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-500 text-xs">
            <p id="ultima-atualizacao">Aguardando carregamento...</p>
        </footer>
    </div>

    <script>
        const formatarMoeda = (valor) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        };

        async function carregarDados() {
            const ano = document.getElementById('ano-select').value;
            const statusUpdate = document.getElementById('ultima-atualizacao');
            statusUpdate.innerText = "Carregando dados da planilha...";

            try {
                // Chamada para a API que criamos no Python
                const response = await fetch(`/api/data?ano=${ano}`);
                const data = await response.json();

                if (data.status === 'success') {
                    // Atualizar KPIs
                    document.getElementById('kpi-faturamento').innerText = formatarMoeda(data.kpis.faturamento);
                    document.getElementById('kpi-despesas').innerText = formatarMoeda(data.kpis.despesas);
                    document.getElementById('kpi-resultado').innerText = formatarMoeda(data.kpis.resultado);
                    document.getElementById('ultima-atualizacao').innerText = `Última atualização: ${data.ultima_atualizacao}`;

                    renderizarGraficos(data.graficos);
                } else {
                    alert("Erro ao processar: " + data.message);
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                statusUpdate.innerText = "Erro ao conectar com o servidor.";
            }
        }

        function renderizarGraficos(graficos) {
            const layoutBase = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#f8fafc' },
                margin: { t: 20, b: 40, l: 40, r: 20 }
            };

            // Gráfico de Pizza (Setores)
            const dataPizza = [{
                values: Object.values(graficos.setores),
                labels: Object.keys(graficos.setores),
                type: 'pie',
                hole: 0.4,
                marker: { colors: ['#10b981', '#3b82f6', '#f43f5e', '#f59e0b', '#8b5cf6'] }
            }];
            Plotly.newPlot('chart-setores', dataPizza, layoutBase);

            // Gráfico de Barras (Categorias)
            const dataBarras = [{
                x: Object.values(graficos.top_categorias),
                y: Object.keys(graficos.top_categorias),
                type: 'bar',
                orientation: 'h',
                marker: { color: '#3b82f6' }
            }];
            const layoutBarras = { ...layoutBase, yaxis: { automargin: true } };
            Plotly.newPlot('chart-categorias', dataBarras, layoutBarras);
        }

        // Carregar automaticamente ao abrir
        window.onload = carregarDados;
    </script>
</body>
</html>
