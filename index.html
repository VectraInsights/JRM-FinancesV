<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRM Financial Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --st-bg: #0e1117;
            --st-secondary-bg: #1a1c24;
            --st-text: #fafafa;
            --st-border: rgba(250, 250, 250, 0.1);
        }
        body { background-color: var(--st-bg); color: var(--st-text); font-family: 'Source Sans Pro', sans-serif; margin: 0; padding: 2rem; }
        
        /* Cabeçalho igual ao Streamlit */
        .header-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; }
        .brand-title { font-size: 1.5rem; font-weight: 700; }
        .brand-subtitle { color: rgba(250, 250, 250, 0.6); font-size: 0.9rem; }
        .brand-periodo { font-size: 0.85rem; margin-top: 0.5rem; }

        /* Botões de Ação no Canto Superior Direito */
        .st-action-buttons { display: flex; gap: 0.5rem; }
        .st-btn-icon { background: #262730; border: 1px solid var(--st-border); border-radius: 4px; padding: 6px; cursor: pointer; }
        
        /* Menu de Filtros (Popover) */
        #filter-menu { display: none; position: absolute; right: 2rem; top: 5rem; background: #262730; border: 1px solid var(--st-border); border-radius: 8px; padding: 1.5rem; z-index: 100; width: 250px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        /* KPIs Estilo Streamlit */
        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-bottom: 3rem; text-align: center; }
        .kpi-label { font-size: 0.9rem; opacity: 0.7; margin-bottom: 0.5rem; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; }

        /* Blocos de Gráfico */
        .st-block { border: 1px solid var(--st-border); border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 2rem; }
        .block-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }

        hr { border: 0; border-top: 1px solid var(--st-border); margin: 2rem 0; }
        
        /* Tabela igual ao print */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 1rem; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--st-border); color: rgba(255,255,255,0.6); }
        td { padding: 10px; border-bottom: 1px solid var(--st-border); }
        .val-col { text-align: right; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto">
        <div class="header-container">
            <div>
                <div class="brand-title">📊 JRM Financial Dashboard</div>
                <div class="brand-subtitle">by Vectra Insights</div>
                <div id="display-periodo" class="brand-periodo"><b>Período:</b> Carregando...</div>
            </div>
            
            <div class="st-action-buttons">
                <button class="st-btn-icon" onclick="toggleFilters()" title="Filtros">⚙️</button>
                <button class="st-btn-icon" onclick="carregarDados()" title="Atualizar">🔄</button>
            </div>
        </div>

        <div id="filter-menu">
            <label class="block text-xs font-bold mb-2 opacity-60 uppercase">Visão:</label>
            <select id="ano-select" onchange="carregarDados()" class="w-full bg-[#0e1117] border border-white/10 p-2 rounded mb-4 text-sm">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
            </select>
            
            <label class="block text-xs font-bold mb-2 opacity-60 uppercase">Meses:</label>
            <div id="meses-container" class="space-y-1 text-sm max-h-48 overflow-y-auto pr-2"></div>
        </div>

        <div class="kpi-row">
            <div>
                <div class="kpi-label">Faturamento</div>
                <div id="kpi-faturamento" class="kpi-value text-[#22c55e]">R$ 0,00</div>
            </div>
            <div>
                <div class="kpi-label">Despesas</div>
                <div id="kpi-despesas" class="kpi-value text-[#ff4b4b]">R$ 0,00</div>
            </div>
            <div>
                <div class="kpi-label">Resultado</div>
                <div id="kpi-resultado" class="kpi-value text-[#3b82f6]">R$ 0,00</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="st-block">
                <div class="block-title">Receitas</div>
                <div id="chart-receitas" class="h-80"></div>
            </div>
            <div class="st-block">
                <div class="block-title">Despesas</div>
                <div id="chart-despesas" class="h-80"></div>
            </div>
        </div>

        <hr>

        <div class="st-block">
            <div class="block-title">Tendência Mensal — <span id="ano-titulo">2026</span></div>
            <div id="chart-tendencia" class="h-96"></div>
        </div>

        <hr>

        <div class="st-block">
            <div class="block-title">Top Despesas</div>
            <div id="chart-top" class="h-[500px]"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="st-block">
                <div class="block-title">📋 Detalhe Receitas</div>
                <table><thead><tr><th>Receita</th><th class="val-col">Valor</th></tr></thead><tbody id="tab-receitas-body"></tbody></table>
            </div>
            <div class="st-block">
                <div class="block-title">📋 Detalhe Despesas</div>
                <table><thead><tr><th>Setor</th><th class="val-col">Valor</th></tr></thead><tbody id="tab-despesas-body"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        let rawData = null;
        const MESES_ORDEM = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        function toggleFilters() {
            const menu = document.getElementById('filter-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        async function carregarDados() {
            const ano = document.getElementById('ano-select').value;
            try {
                const res = await fetch(`/api/data?ano=${ano}`);
                rawData = await res.json();
                
                if (rawData.status === 'success') {
                    popularMeses();
                    renderUI();
                }
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        function popularMeses() {
            const container = document.getElementById('meses-container');
            if (container.innerHTML !== "") return; // Não reseta se já tiver meses

            container.innerHTML = rawData.meses_disponiveis
                .sort((a,b) => MESES_ORDEM.indexOf(a) - MESES_ORDEM.indexOf(b))
                .map(m => `<label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="${m}" checked onchange="renderUI()"> ${m}</label>`)
                .join('');
        }

        function renderUI() {
            const selecionados = Array.from(document.querySelectorAll('#meses-container input:checked')).map(i => i.value);
            document.getElementById('display-periodo').innerHTML = `<b>Período:</b> ${selecionados.join(', ')}`;
            document.getElementById('ano-titulo').innerText = document.getElementById('ano-select').value;

            const r = rawData.raw_receitas.filter(d => selecionados.includes(d.Mes));
            const dr = rawData.raw_despesas_res.filter(d => selecionados.includes(d.Mes));
            const dd = rawData.raw_despesas_det.filter(d => selecionados.includes(d.Mes));

            const faturamento = r.reduce((a,b) => a + b.Valor, 0);
            const despesas = dr.reduce((a,b) => a + b.Valor, 0);
            const fmt = v => "R$ " + v.toLocaleString('pt-BR', {minimumFractionDigits:2});

            document.getElementById('kpi-faturamento').innerText = fmt(faturamento);
            document.getElementById('kpi-despesas').innerText = fmt(despesas);
            document.getElementById('kpi-resultado').innerText = fmt(faturamento - despesas);

            renderPlots(r, dr, dd, selecionados);
            renderTables(r, dr);
        }

        function renderPlots(r, dr, dd, meses) {
            const commonLayout = {
                paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#fafafa', family: 'Source Sans Pro' },
                margin: { t:10, b:40, l:40, r:10 },
                showlegend: true, legend: { orientation: 'h', y: -0.2 }
            };

            // Receitas Pizza
            const rAgg = aggregate(r, 'Receita');
            Plotly.newPlot('chart-receitas', [{ values: Object.values(rAgg), labels: Object.keys(rAgg), type: 'pie', hole: 0.6 }], commonLayout);

            // Despesas Pizza
            const drAgg = aggregate(dr, 'Setor');
            Plotly.newPlot('chart-despesas', [{ values: Object.values(drAgg), labels: Object.keys(drAgg), type: 'pie', hole: 0.6 }], commonLayout);

            // Tendência
            const tFat = meses.map(m => r.filter(x => x.Mes === m).reduce((a,b) => a+b.Valor, 0));
            const tDes = meses.map(m => dr.filter(x => x.Mes === m).reduce((a,b) => a+b.Valor, 0));
            Plotly.newPlot('chart-tendencia', [
                { x: meses, y: tFat, name: 'Faturamento', line: {color: '#22c55e', width: 3} },
                { x: meses, y: tDes, name: 'Despesas', line: {color: '#ff4b4b', width: 3} },
                { x: meses, y: tFat.map((v,i) => v - tDes[i]), name: 'Resultado', line: {color: '#3b82f6', width: 3} }
            ], commonLayout);

            // Top Despesas
            const top = Object.entries(aggregate(dd, 'Categoria')).sort((a,b) => b[1]-a[1]).slice(0, 10);
            Plotly.newPlot('chart-top', [{ x: top.map(x => x[1]), y: top.map(x => x[0]), type: 'bar', orientation: 'h', marker: {color: '#79B3E1'} }], {...commonLayout, margin: {l: 150}});
        }

        function renderTables(r, dr) {
            const rAgg = aggregate(r, 'Receita');
            const drAgg = aggregate(dr, 'Setor');
            const fmt = v => "R$ " + v.toLocaleString('pt-BR', {minimumFractionDigits:2});

            document.getElementById('tab-receitas-body').innerHTML = Object.entries(rAgg).map(([k,v]) => `<tr><td>${k}</td><td class="val-col">${fmt(v)}</td></tr>`).join('');
            document.getElementById('tab-despesas-body').innerHTML = Object.entries(drAgg).map(([k,v]) => `<tr><td>${k}</td><td class="val-col">${fmt(v)}</td></tr>`).join('');
        }

        function aggregate(arr, key) {
            return arr.reduce((acc, obj) => { acc[obj[key]] = (acc[obj[key]] || 0) + obj.Valor; return acc; }, {});
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
