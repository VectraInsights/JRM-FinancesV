<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JRM Financial Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --st-bg: #0e1117; --st-text: #fafafa; --st-border: rgba(250, 250, 250, 0.1); }
        body { background-color: var(--st-bg); color: var(--st-text); font-family: 'Source Sans Pro', sans-serif; padding: 1.5rem; }
        .st-block { border: 1px solid var(--st-border); border-radius: 0.5rem; padding: 1.2rem; background: transparent; margin-bottom: 1rem; }
        .kpi-value { font-size: 2.2rem; font-weight: 700; }
        #filter-menu { display: none; position: absolute; right: 2rem; top: 5rem; background: #262730; border: 1px solid var(--st-border); border-radius: 8px; padding: 1.5rem; z-index: 1000; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .st-btn { background: #262730; border: 1px solid var(--st-border); border-radius: 4px; padding: 6px 12px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; border-bottom: 1px solid var(--st-border); padding: 8px; opacity: 0.7; font-size: 0.9rem; }
        td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        .val-col { text-align: right; font-weight: 600; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold">📊 JRM Financial Dashboard</h1>
            <p id="display-periodo" class="text-sm opacity-60"></p>
        </div>
        <div class="flex gap-2">
            <button class="st-btn" onclick="const m=document.getElementById('filter-menu'); m.style.display=m.style.display==='block'?'none':'block'">⚙️ Filtros</button>
            <button class="st-btn" onclick="carregarDados()">🔄 Atualizar</button>
        </div>
    </div>

    <div id="filter-menu">
        <label class="block text-xs font-bold mb-1 opacity-50 uppercase">Visão</label>
        <select id="ano-select" onchange="atualizarInterfacePorAno()" class="w-full bg-[#0e1117] border border-white/10 p-2 rounded mb-4 text-white">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="comparativo">Comparativo</option>
        </select>
        <label class="block text-xs font-bold mb-1 opacity-50 uppercase">Meses</label>
        <div id="meses-container" class="space-y-1 max-h-60 overflow-y-auto"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center">
        <div><div class="opacity-60 text-sm">Faturamento</div><div id="kpi-fat" class="kpi-value text-[#22c55e]">R$ 0,00</div><div id="d-fat" class="text-sm"></div></div>
        <div><div class="opacity-60 text-sm">Despesas</div><div id="kpi-des" class="kpi-value text-[#ff4b4b]">R$ 0,00</div><div id="d-des" class="text-sm"></div></div>
        <div><div class="opacity-60 text-sm">Resultado</div><div id="kpi-res" class="kpi-value text-[#3b82f6]">R$ 0,00</div><div id="d-res" class="text-sm"></div></div>
    </div>

    <div id="layout-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>

    <div id="secao-listas" class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-12">
        <div class="st-block">
            <h3 class="font-bold border-b border-white/10 pb-2 flex items-center gap-2">📄 Detalhe Receitas</h3>
            <div class="overflow-x-auto">
                <table>
                    <thead><tr><th>Receita</th><th class="val-col">Valor</th></tr></thead>
                    <tbody id="tab-receitas"></tbody>
                </table>
            </div>
        </div>
        <div class="st-block">
            <div class="flex justify-between items-center border-b border-white/10 pb-2">
                <h3 class="font-bold flex items-center gap-2">📄 Detalhe Despesas</h3>
                <select id="modo-tabela" onchange="renderUI()" class="bg-transparent text-xs border border-white/10 rounded p-1">
                    <option value="setor">Resumo por setor</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table>
                    <thead><tr><th>Setor</th><th class="val-col">Valor</th></tr></thead>
                    <tbody id="tab-despesas"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let rawData = null;
        const MESES_ORDEM = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        // CORES EXATAS DA IMAGEM 2
        const CORES_ST = ['#636EFA', '#EF553B', '#00CC96', '#AB63FA', '#FFA15A', '#19D3F3', '#FF6692', '#B6E880', '#FF97FF', '#FECB52'];

        const fmt = v => (v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        async function carregarDados() {
            const res = await fetch('/api/data');
            rawData = await res.json();
            if(rawData.status === 'success') atualizarInterfacePorAno();
        }

        function atualizarInterfacePorAno() {
            const visao = document.getElementById('ano-select').value;
            const ativos = visao === "2025" ? rawData.meses_disponiveis_2025 : rawData.meses_disponiveis_2026;
            document.getElementById('meses-container').innerHTML = MESES_ORDEM
                .filter(m => ativos.includes(m))
                .map(m => `<label class="flex items-center gap-2 py-1"><input type="checkbox" value="${m}" checked onchange="renderUI()"> ${m}</label>`).join('');
            renderUI();
        }

        function renderUI() {
            if(!rawData) return;
            const visao = document.getElementById('ano-select').value;
            const mesesSel = Array.from(document.querySelectorAll('#meses-container input:checked')).map(i => i.value);
            const container = document.getElementById('layout-container');
            const secaoListas = document.getElementById('secao-listas');

            document.getElementById('display-periodo').innerText = "Período: " + mesesSel.join(", ");

            if(visao === 'comparativo') {
                secaoListas.style.display = 'none';
                container.className = "grid grid-cols-1 lg:grid-cols-3 gap-4";
                renderComparativo(mesesSel);
            } else {
                secaoListas.style.display = 'grid';
                container.className = "grid grid-cols-1 lg:grid-cols-2 gap-8";
                renderIndividual(visao, mesesSel);
            }
        }

        function renderIndividual(ano, meses) {
            const d = rawData[`ano_${ano}`];
            const r = d.receitas.filter(x => meses.includes(x.Mes));
            const dr = d.despesas_res.filter(x => meses.includes(x.Mes));

            const tR = r.reduce((a,b)=>a+b.Valor,0), tD = dr.reduce((a,b)=>a+b.Valor,0);
            document.getElementById('kpi-fat').innerText = "R$ " + fmt(tR);
            document.getElementById('kpi-des').innerText = "R$ " + fmt(tD);
            document.getElementById('kpi-res').innerText = "R$ " + fmt(tR-tD);
            document.getElementById('d-fat').innerHTML = ""; document.getElementById('d-des').innerHTML = ""; document.getElementById('d-res').innerHTML = "";

            document.getElementById('layout-container').innerHTML = `
                <div class="st-block"><h3>Receitas</h3><div id="c1" class="h-[400px]"></div></div>
                <div class="st-block"><h3>Despesas</h3><div id="c2" class="h-[400px]"></div></div>`;
            
            renderPie('c1', aggregate(r, 'Receita'));
            renderPie('c2', aggregate(dr, 'Setor'));

            // Preencher Tabelas (Imagem 3)
            fillTable('tab-receitas', aggregate(r, 'Receita'));
            fillTable('tab-despesas', aggregate(dr, 'Setor'));
        }

        function fillTable(id, data) {
            const body = document.getElementById(id);
            const sorted = Object.entries(data).sort((a,b) => b[1] - a[1]);
            body.innerHTML = sorted.map(([k, v]) => `<tr><td>${k}</td><td class="val-col">R$ ${fmt(v)}</td></tr>`).join('');
        }

        function renderPie(div, data) {
            Plotly.newPlot(div, [{
                values: Object.values(data),
                labels: Object.keys(data),
                type: 'pie',
                hole: 0.5,
                marker: { colors: CORES_ST },
                textinfo: 'percent',
                insidetextorientation: 'radial'
            }], {
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent',
                font: { color: '#fff' },
                margin: { t: 40, b: 40, l: 0, r: 150 }, // Margem direita para legenda lateral
                showlegend: true,
                legend: { x: 1, y: 0.5, xanchor: 'left' } // Legenda Lateral igual Imagem 2
            }, { displayModeBar: false });
        }

        function renderComparativo(meses) {
            const d26 = rawData.ano_2026, d25 = rawData.ano_2025;
            const somar = (d, m) => d.filter(x => m.includes(x.Mes)).reduce((a,b)=>a+b.Valor, 0);
            
            const f26 = somar(d26.receitas, meses), f25 = somar(d25.receitas, meses);
            const ds26 = somar(d26.despesas_res, meses), ds25 = somar(d25.despesas_res, meses);

            updateKPI('fat', f26, f25); updateKPI('des', ds26, ds25); updateKPI('res', f26-ds26, f25-ds25);

            document.getElementById('layout-container').innerHTML = `
                <div class="st-block"><h3>Faturamento</h3><div id="cm1" class="h-80"></div></div>
                <div class="st-block"><h3>Despesas</h3><div id="cm2" class="h-80"></div></div>
                <div class="st-block"><h3>Resultado</h3><div id="cm3" class="h-80"></div></div>`;

            const getS = (data, m) => m.map(mes => data.filter(x => x.Mes === mes).reduce((a,b)=>a+b.Valor,0));
            
            renderCompBars('cm1', getS(d25.receitas, meses), getS(d26.receitas, meses), meses, '#22c55e');
            renderCompBars('cm2', getS(d25.despesas_res, meses), getS(d26.despesas_res, meses), meses, '#ff4b4b');
            
            const res25 = meses.map(m => somar(d25.receitas, [m]) - somar(d25.despesas_res, [m]));
            const res26 = meses.map(m => somar(d26.receitas, [m]) - somar(d26.despesas_res, [m]));
            renderCompBars('cm3', res25, res26, meses, '#3b82f6');
        }

        function updateKPI(id, v26, v25) {
            const diff = ((v26/v25)-1)*100;
            document.getElementById(`kpi-${id}`).innerText = "R$ " + fmt(v26);
            document.getElementById(`d-${id}`).innerHTML = `<span class="opacity-50">R$ ${fmt(v25)} (2025)</span> <span style="color:${(id==='des'?diff<0:diff>0)?'#22c55e':'#ff4b4b'}">${diff>0?'+':''}${diff.toFixed(1)}%</span>`;
        }

        function renderCompBars(div, s25, s26, meses, cor26) {
            Plotly.newPlot(div, [
                { x: meses, y: s25, name: '2025', type: 'bar', marker: {color: '#94A3B8'} },
                { x: meses, y: s26, name: '2026', type: 'bar', marker: {color: cor26} }
            ], { barmode: 'group', paper_bgcolor: 'transparent', plot_bgcolor: 'transparent', font: {color: '#fff'}, margin: {t:20, b:40, l:40, r:10}, showlegend: false }, {displayModeBar: false});
        }

        function aggregate(arr, key) { return arr.reduce((acc, obj) => { acc[obj[key]] = (acc[obj[key]] || 0) + obj.Valor; return acc; }, {}); }
        window.onload = carregarDados;
    </script>
</body>
</html>
